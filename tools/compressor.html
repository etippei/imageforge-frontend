<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Compressor - ImageForge</title>
    <link rel="stylesheet" href="../common.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>
<div class="tool-page-container">
    <header class="site-header">
        <div class="logo"><h1>ImageForge<span>AI</span></h1><span>Compressor</span></div>
        <div class="nav-links">
            <a href="../index.html" class="nav-link">🏠 Home</a>
            <a href="upscaler.html" class="nav-link">✨ Upscaler</a>
            <a href="compressor.html" class="nav-link active">🗜️ Compressor</a>
            <a href="bg-remover.html" class="nav-link">🎨 BG Remover</a>
            <a href="convert.html" class="nav-link">🔄 PNG to JPG</a>
            <a href="resize.html" class="nav-link">📏 Resize</a>
        </div>
        <div class="auth-area" id="authWidget"></div>
    </header>

    <div class="tool-card-large">
        <a href="../index.html" class="back-link">← Back</a>
        <h1><i class="fas fa-compress"></i> Image Compressor</h1>
        <p>Reduce file size using Sharp high-quality compression</p>
        <div id="usageDisplay" style="margin: 16px 0;"></div>

        <div class="dropzone" id="dropzone">
            <i class="fas fa-cloud-upload-alt fa-2x"></i>
            <p>Click or drag image to compress</p>
            <input type="file" id="fileInput" accept="image/*" style="display:none">
        </div>

        <div id="previewArea" class="preview-area" style="display:none">
            <div class="preview-box"><strong>Original</strong><img id="originalImg" class="preview-img"><div id="originalInfo"></div></div>
            <div class="preview-box"><strong>Compressed</strong><img id="resultImg" class="preview-img" style="display:none"><div id="resultInfo"></div><div id="loaderDiv"></div></div>
        </div>

        <div id="actionButtons" class="action-buttons" style="display:none">
            <button class="btn btn-primary" id="processBtn">Compress Image</button>
            <button class="btn btn-outline" id="resetBtn">Clear</button>
            <button class="btn btn-outline" id="downloadBtn" disabled>Download</button>
        </div>
    </div>
    <footer>© 2026 AI ImageForge — Powered by Sharp</footer>
</div>
<script src="../common.js"></script>
<script>
let originalFile = null;
let resultBase64 = null;

const dropzone = document.getElementById('dropzone');
const fileInput = document.getElementById('fileInput');
const previewArea = document.getElementById('previewArea');
const actionButtons = document.getElementById('actionButtons');
const originalImg = document.getElementById('originalImg');
const resultImg = document.getElementById('resultImg');
const loaderDiv = document.getElementById('loaderDiv');
const processBtn = document.getElementById('processBtn');
const resetBtn = document.getElementById('resetBtn');
const downloadBtn = document.getElementById('downloadBtn');
const originalInfo = document.getElementById('originalInfo');
const resultInfo = document.getElementById('resultInfo');

window.ForgeAuth.displayUsageInfo('usageDisplay', 'compressor');

async function handleFile(file) {
    const user = window.ForgeAuth.currentUser();
    if (!user) { window.ForgeAuth.openAuthModal('login'); return; }
    try {
        const usage = await window.ForgeAuth.getUsage();
        if (!usage.tools.compressor.isPro && usage.tools.compressor.remaining <= 0) {
            alert(`⚠️ Daily limit reached. Upgrade to Pro.`);
            return;
        }
    } catch (e) { alert('Could not check usage.'); return; }
    originalFile = file;
    originalImg.src = URL.createObjectURL(file);
    originalInfo.innerHTML = window.ForgeAuth.formatFileSize(file.size);
    previewArea.style.display = 'flex';
    actionButtons.style.display = 'flex';
    resultImg.style.display = 'none';
    resultBase64 = null;
    downloadBtn.disabled = true;
    loaderDiv.innerHTML = 'Ready to compress';
}

processBtn.addEventListener('click', async () => {
    if (!originalFile) return;
    const user = window.ForgeAuth.currentUser();
    if (!user) { window.ForgeAuth.openAuthModal('login'); return; }

    processBtn.disabled = true;
    loaderDiv.innerHTML = '<i class="fas fa-spinner fa-pulse"></i> Compressing...';

    try {
        const response = await window.ForgeAuth.uploadToVPS('/sharp/compress', originalFile);
        const result = await window.ForgeAuth.pollResult(response.task_id);
        resultBase64 = result.result;
        resultImg.src = `data:image/jpeg;base64,${resultBase64}`;
        resultImg.style.display = 'block';
        const approxSize = Math.round(resultBase64.length * 0.75);
        resultInfo.innerHTML = `~${(approxSize/1024).toFixed(1)} KB`;
        loaderDiv.innerHTML = `✅ Compressed in ${(result.processing_time || 0).toFixed(0)}ms`;
        downloadBtn.disabled = false;
        window.ForgeAuth.displayUsageInfo('usageDisplay', 'compressor');
    } catch (error) {
        loaderDiv.innerHTML = `❌ Error: ${error.message}`;
        alert(`Compression failed: ${error.message}`);
    } finally {
        processBtn.disabled = false;
    }
});

resetBtn.onclick = () => { previewArea.style.display = 'none'; actionButtons.style.display = 'none'; originalFile = null; fileInput.value = ''; };
downloadBtn.onclick = () => { if(resultBase64) window.ForgeAuth.downloadBase64(resultBase64, 'compressed.jpg', 'image/jpeg'); };
dropzone.onclick = () => fileInput.click();
dropzone.ondragover = e => { e.preventDefault(); dropzone.classList.add('active'); };
dropzone.ondragleave = () => dropzone.classList.remove('active');
dropzone.ondrop = e => { e.preventDefault(); dropzone.classList.remove('active'); if(e.dataTransfer.files[0]) handleFile(e.dataTransfer.files[0]); };
fileInput.onchange = e => { if(e.target.files[0]) handleFile(e.target.files[0]); };
</script>
</body>
</html>
