name: Publish Blog from Issues

on:
  issues:
    types: [opened, edited, labeled, unlabeled, closed]
  workflow_dispatch:

jobs:
  build-blog:
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'workflow_dispatch' ||
      contains(github.event.issue.labels.*.name, 'blog') ||
      contains(github.event.issue.labels.*.name, 'blog-post')
    permissions:
      contents: write
      issues: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install markdown pyyaml frontmatter requests

      - name: Debug - List files
        run: |
          ls -la
          ls -la .github/scripts/ || echo "Scripts directory not found"

      - name: Fetch and Build Blog Posts
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPO: ${{ github.repository }}
        run: |
          python .github/scripts/build_blog.py

      - name: Debug - Check generated files
        run: |
          ls -la blog/ || echo "blog directory not found"
          ls -la blog/posts/ || echo "posts directory not found"

      - name: Commit and push generated files
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git add blog/ blog.html
          git diff --staged --quiet || git commit -m "chore: auto-update blog from issues [skip ci]"
          git push
